<div class="layout">
  <button
    type="button"
    class="layout__hamburger"
    [class.is-active]="sidebarOpen()"
    [attr.aria-label]="sidebarOpen() ? 'Đóng menu' : 'Mở menu'"
    [attr.aria-expanded]="sidebarOpen()"
    (click)="toggleSidebar()"
  >
    <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
      @if (sidebarOpen()) {
        <path
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          d="M6 6l12 12M18 6L6 18"
        />
      } @else {
        <path
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          d="M4 7h16M4 12h16M4 17h16"
        />
      }
    </svg>
  </button>

  <main class="layout__main">
    <router-outlet />
  </main>

  <div
    class="layout__backdrop"
    [class.is-visible]="sidebarOpen()"
    (click)="closeSidebar()"
    aria-hidden="true"
  ></div>

  <app-sidebar
    class="layout__aside"
    [class.is-open]="sidebarOpen()"
  />
</div>
