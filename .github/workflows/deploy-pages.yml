name: Deploy to GitHub Pages

# Build and deploy Angular app to GitHub Pages on every push to main.
# Requires Settings → Pages → Source = "GitHub Actions" (not "Deploy from a branch").

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual re-run from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Build Angular (with /eng/ base-href)
        run: npx ng build --base-href "/eng/" --configuration production

      - name: SPA fallback — copy index.html to 404.html
        run: cp dist/eng-toeic/browser/index.html dist/eng-toeic/browser/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/eng-toeic/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
